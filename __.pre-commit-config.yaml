repos:
    - repo: local
      hooks:
          - id: prettier
            name: prettier
            entry: node "shadow/node_modules/prettier/bin/prettier.cjs" --write --plugin="shadow/node_modules/@prettier/plugin-xml/src/plugin.js" --ignore-unknown
            language: system
            files: ^fonts\.conf$|\.(axaml|clang-format|csproj|css|htm|html|js|json|jsonc|jsx|manifest|md|props|slnx|ts|tsx|vcxproj|vcxproj.filters|xaml|xml|yaml|yml)$

    - repo: local
      hooks:
          - id: PSScriptAnalyzer
            name: PSScriptAnalyzer
            entry: powershell -NoProfile -ExecutionPolicy Bypass -File "./shadow/_format-powershell.ps1"
            language: system
            files: \.(ps1)$

    - repo: https://github.com/pre-commit/mirrors-clang-format
      rev: v20.1.0
      hooks:
          - id: clang-format
            entry: clang-format -i
            args:
                - -style=file
            files: \.(c|cc|cpp|cxx|h|hh|hpp|hxx|inl|ixx)$

    - repo: https://github.com/pycqa/isort
      rev: 8.0.1
      hooks:
          - id: isort
            args:
                - --profile
                - black
            files: \.(py)$

    - repo: https://github.com/psf/black
      rev: 26.3.1
      hooks:
          - id: black
            args:
                - --safe
                - --workers=4
                - --target-version=py312
                - --line-length=160
            files: \.(py)$
